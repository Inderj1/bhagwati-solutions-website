<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d5e8d4;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#87ceeb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#b8e6f0;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="800" height="600" fill="url(#bg2)"/>
  <!-- Wall -->
  <rect x="100" y="50" width="600" height="500" fill="#f0ebe3"/>
  <!-- Window frame outer -->
  <rect x="180" y="100" width="440" height="350" rx="3" fill="#f5f5f5" stroke="#c4c4c4" stroke-width="6"/>
  <!-- Window panes - 2x2 grid -->
  <rect x="195" y="115" width="205" height="160" rx="2" fill="url(#sky)" stroke="#d4d4d4" stroke-width="3"/>
  <rect x="410" y="115" width="200" height="160" rx="2" fill="url(#sky)" stroke="#d4d4d4" stroke-width="3"/>
  <rect x="195" y="285" width="205" height="150" rx="2" fill="url(#sky)" stroke="#d4d4d4" stroke-width="3"/>
  <rect x="410" y="285" width="200" height="150" rx="2" fill="url(#sky)" stroke="#d4d4d4" stroke-width="3"/>
  <!-- Window handles -->
  <rect x="390" y="200" width="8" height="30" rx="2" fill="#888"/>
  <rect x="390" y="340" width="8" height="30" rx="2" fill="#888"/>
  <!-- Clouds through window -->
  <ellipse cx="280" cy="160" rx="40" ry="18" fill="white" opacity="0.7"/>
  <ellipse cx="300" cy="155" rx="30" ry="15" fill="white" opacity="0.5"/>
  <ellipse cx="500" cy="180" rx="35" ry="16" fill="white" opacity="0.6"/>
  <!-- Curtain suggestion -->
  <path d="M175,95 Q180,250 175,450" stroke="#d5bdaf" stroke-width="3" fill="none" opacity="0.5"/>
  <path d="M625,95 Q620,250 625,450" stroke="#d5bdaf" stroke-width="3" fill="none" opacity="0.5"/>
  <!-- Noise reduction badge -->
  <circle cx="660" cy="520" r="35" fill="#fb923c" opacity="0.15"/>
  <text x="660" y="517" font-family="system-ui,sans-serif" font-size="14" fill="#fb923c" text-anchor="middle" font-weight="700">80%</text>
  <text x="660" y="533" font-family="system-ui,sans-serif" font-size="9" fill="#fb923c" text-anchor="middle" font-weight="600">NOISE CUT</text>
</svg>
