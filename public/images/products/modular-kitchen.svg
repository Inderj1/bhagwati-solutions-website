<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="bg5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#faf3eb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e8ddd0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="cab" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f5f0ea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e8ddd0;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="800" height="600" fill="url(#bg5)"/>
  <!-- Back wall -->
  <rect x="80" y="40" width="640" height="520" fill="#f5f0ea"/>
  <!-- Upper cabinets -->
  <rect x="100" y="60" width="150" height="160" rx="3" fill="url(#cab)" stroke="#d6ccc2" stroke-width="2"/>
  <rect x="260" y="60" width="150" height="160" rx="3" fill="url(#cab)" stroke="#d6ccc2" stroke-width="2"/>
  <rect x="420" y="60" width="150" height="160" rx="3" fill="url(#cab)" stroke="#d6ccc2" stroke-width="2"/>
  <rect x="580" y="60" width="120" height="160" rx="3" fill="url(#cab)" stroke="#d6ccc2" stroke-width="2"/>
  <!-- Cabinet handles upper -->
  <line x1="170" y1="130" x2="170" y2="155" stroke="#8b7355" stroke-width="3" stroke-linecap="round"/>
  <line x1="330" y1="130" x2="330" y2="155" stroke="#8b7355" stroke-width="3" stroke-linecap="round"/>
  <line x1="490" y1="130" x2="490" y2="155" stroke="#8b7355" stroke-width="3" stroke-linecap="round"/>
  <line x1="635" y1="130" x2="635" y2="155" stroke="#8b7355" stroke-width="3" stroke-linecap="round"/>
  <!-- Backsplash -->
  <rect x="100" y="230" width="600" height="70" fill="#e0d5c8"/>
  <!-- Tile pattern -->
  <line x1="100" y1="265" x2="700" y2="265" stroke="#d6ccc2" stroke-width="1"/>
  <line x1="175" y1="230" x2="175" y2="300" stroke="#d6ccc2" stroke-width="0.5"/>
  <line x1="250" y1="230" x2="250" y2="300" stroke="#d6ccc2" stroke-width="0.5"/>
  <line x1="325" y1="230" x2="325" y2="300" stroke="#d6ccc2" stroke-width="0.5"/>
  <line x1="400" y1="230" x2="400" y2="300" stroke="#d6ccc2" stroke-width="0.5"/>
  <line x1="475" y1="230" x2="475" y2="300" stroke="#d6ccc2" stroke-width="0.5"/>
  <line x1="550" y1="230" x2="550" y2="300" stroke="#d6ccc2" stroke-width="0.5"/>
  <line x1="625" y1="230" x2="625" y2="300" stroke="#d6ccc2" stroke-width="0.5"/>
  <!-- Countertop -->
  <rect x="95" y="300" width="615" height="15" rx="2" fill="#a08060"/>
  <!-- Lower cabinets -->
  <rect x="100" y="320" width="180" height="200" rx="3" fill="url(#cab)" stroke="#d6ccc2" stroke-width="2"/>
  <rect x="290" y="320" width="180" height="200" rx="3" fill="url(#cab)" stroke="#d6ccc2" stroke-width="2"/>
  <rect x="480" y="320" width="220" height="200" rx="3" fill="url(#cab)" stroke="#d6ccc2" stroke-width="2"/>
  <!-- Lower handles -->
  <line x1="185" y1="400" x2="185" y2="430" stroke="#8b7355" stroke-width="3" stroke-linecap="round"/>
  <line x1="375" y1="400" x2="375" y2="430" stroke="#8b7355" stroke-width="3" stroke-linecap="round"/>
  <line x1="585" y1="400" x2="585" y2="430" stroke="#8b7355" stroke-width="3" stroke-linecap="round"/>
  <!-- Stove -->
  <rect x="310" y="302" width="140" height="10" rx="2" fill="#555"/>
  <circle cx="345" cy="307" r="12" fill="none" stroke="#777" stroke-width="1.5"/>
  <circle cx="415" cy="307" r="12" fill="none" stroke="#777" stroke-width="1.5"/>
  <!-- Sink -->
  <rect x="140" y="303" width="80" height="8" rx="10" fill="#999" opacity="0.5"/>
  <rect x="130" y="303" width="6" height="20" rx="2" fill="#888"/>
  <!-- Faucet -->
  <path d="M162,285 L162,300 Q162,303 165,303" stroke="#888" stroke-width="3" fill="none"/>
</svg>
